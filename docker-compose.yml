# Local single-node Apache Kafka (KRaft mode — no ZooKeeper, no Confluent components, §4).
#
# Auto-create is disabled on purpose so the backend's AdminClient provisioner (§8/§18.5) creates the
# platform topics, exactly as on a regulated cluster. Start it with:  docker compose up -d
#
# The backend then runs on the host and connects to localhost:9092 (the default).
services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: erp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Match a regulated cluster: the platform provisions its own topics explicitly.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
