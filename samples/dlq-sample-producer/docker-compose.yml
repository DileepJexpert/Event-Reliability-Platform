# Local single-node Apache Kafka (KRaft mode — no ZooKeeper, no Confluent components).
#
# This is a copy of the Event Reliability Platform's broker definition, bundled here so this sample is
# self-contained: you can `docker compose up -d` from THIS folder to get the same broker on
# localhost:9092 (container name erp-kafka). Auto-create is disabled on purpose — the platform backend
# provisions the reliability.* topics at startup, so you still need the backend running for messages to
# be processed (see README.md).
#
# An optional dev-only Kafka UI (kafka-ui, behind the "tools" profile) is available for browsing
# topics/messages while debugging — it is NOT part of the platform. Start it only when needed:
#   docker compose --profile tools up -d kafka-ui      # then open http://localhost:8088
services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: erp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT (advertised as localhost:9092) is for the host-run backend/sample. DOCKER (advertised
      # as kafka:29092) is an extra in-network listener so on-network containers — e.g. the optional
      # kafka-ui below — can reach the broker by its service name. Inter-broker stays PLAINTEXT.
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,DOCKER://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,DOCKER://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  # Optional dev-only broker inspector — NOT part of the platform. Plain-Apache-Kafka compatible
  # (no Confluent / Schema Registry). Behind the "tools" profile so the default `docker compose up -d`
  # stays broker-only; start it on demand and open http://localhost:8088 :
  #   docker compose --profile tools up -d kafka-ui
  kafka-ui:
    image: kafbat/kafka-ui:latest   # maintained fork of provectuslabs/kafka-ui; pin a tag for reproducibility
    container_name: erp-kafka-ui
    profiles: ["tools"]
    depends_on:
      - kafka
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: erp-local
      # Reach the broker over the compose network via its in-network advertised listener (above).
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
