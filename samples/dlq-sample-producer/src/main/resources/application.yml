spring:
  application:
    name: dlq-sample-producer
  kafka:
    # Point this at your local Kafka (the docker compose broker in the platform repo listens here).
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        # Fail fast with a clear message if the platform hasn't provisioned the topic yet
        # (the broker has auto-create disabled, so the topic only exists once the backend has started).
        max.block.ms: 12000
    # Consumer side: this sample also plays a real owning application — it consumes the business topic
    # it produced to (POST /produce), simulates a processing failure, retries, then the *brod starter*
    # auto-captures the exhausted record to the platform DLQ (no hand-written recoverer — see the README).
    # (The original /send/* endpoints still publish straight to the DLQ to show the raw header contract.)
    consumer:
      group-id: ${SIM_CONSUMER_GROUP:dlq-sample-consumer}
      # Only handle new messages we produce/replay — don't reprocess the whole business topic on restart.
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      # The business topic is created by SampleTopics at startup; tolerate the brief window before it appears.
      missing-topics-fatal: false

server:
  # 8081 so it does not clash with the platform backend on 8080.
  port: ${SERVER_PORT:8081}

# ---- Sample-producer settings ----
dlq:
  # The platform's DLQ ingestion topic == <reliability.topic-prefix> + "dlq.inbound".
  # Keep this in sync with the backend's reliability.topic-prefix (default "reliability.").
  topic: ${DLQ_TOPIC:reliability.dlq.inbound}
  # Goes into the x-source-app header — i.e. "which app produced this failure".
  source-app: ${DLQ_SOURCE_APP:sample-payments-service}
  # Publish one of each sample failure on startup so the platform lights up immediately.
  autosend-on-startup: ${DLQ_AUTOSEND:true}

# ---- Realistic produce -> consume -> retry -> DLQ flow (POST /produce) ----
sim:
  # Business topic this sample produces to and consumes from (SampleTopics creates it on startup).
  business-topic: ${SIM_BUSINESS_TOPIC:payments.transactions}

# ---- Brod starter: auto-DLQ capture on exhausted retries (replaces the hand-written recoverer) ----
brod:
  # Platform DLQ to capture exhausted records to (keep == dlq.topic / backend reliability.topic-prefix).
  dlq-topic: ${DLQ_TOPIC:reliability.dlq.inbound}
  retries: ${BROD_RETRIES:2}          # 2 retries = 3 total delivery attempts
  backoff-ms: ${BROD_BACKOFF_MS:1000}

logging:
  level:
    com.example.dlqsample: INFO
    org.apache.kafka.clients.producer.ProducerConfig: WARN
    org.apache.kafka.clients.consumer.ConsumerConfig: WARN
    org.apache.kafka.clients.admin: WARN
