spring:
  application:
    name: event-reliability-service

  # Classification rules live in their own file so ops can edit them without touching app config (§11).
  config:
    import: optional:classpath:classification-rules.yml

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${RELIABILITY_GROUP_ID:event-reliability}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      properties:
        max.poll.records: 100
        # Pattern-detection windows and the pause/seek delay loop both need a forgiving poll interval.
        max.poll.interval.ms: 300000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      acks: all
      properties:
        # Idempotent producer (§18.4): exactly-once-into-topic semantics for republish + state writes.
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    listener:
      ack-mode: record
      concurrency: ${RELIABILITY_LISTENER_CONCURRENCY:3}
      # Provisioner creates topics at startup; tolerate the brief window before they appear.
      missing-topics-fatal: false
    streams:
      application-id: ${RELIABILITY_STREAMS_APP_ID:event-reliability-streams}
      state-dir: ${RELIABILITY_STREAMS_STATE_DIR:/tmp/kafka-streams/event-reliability}
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        commit.interval.ms: 1000
        num.stream.threads: 2
        processing.guarantee: at_least_once
        # Tolerate transient deserialization issues in the detection stream without crashing it.
        default.deserialization.exception.handler: org.apache.kafka.streams.errors.LogAndContinueExceptionHandler

# ---- Self-contained observability (§14): Micrometer + Actuator, no external APM ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: ${SERVER_PORT:8080}

# ---- Platform configuration (§4, §8, §10, §14) ----
reliability:
  topic-prefix: ${RELIABILITY_TOPIC_PREFIX:reliability.}
  # Inbound correlation-id header (§6.3). Apps onboarded here emit the id as `correlationId`; the
  # platform's native `x-correlation-id` is always retained as a fallback alias, so existing
  # producers keep working. Comma-separated to add more aliases, highest priority first.
  headers:
    correlation-id: ${RELIABILITY_CORRELATION_ID_HEADERS:correlationId}
  # Multi-team DLQ ingestion (§8). The default <prefix>dlq.inbound is always consumed; list extra full
  # DLQ topic names here (e.g. one per team/domain) and Brod also subscribes to, provisions and
  # pattern-detects across them, recording which DLQ each failure arrived on (shown/filterable in the
  # console). Comma-separated, e.g. RELIABILITY_DLQ_TOPICS=reliability.dlq.lending,reliability.dlq.payments
  ingest:
    dlq-topics: ${RELIABILITY_DLQ_TOPICS:}
  topics:
    partitions: ${RELIABILITY_TOPIC_PARTITIONS:3}
    replication-factor: ${RELIABILITY_TOPIC_RF:1}
    audit-retention-ms: 7776000000   # 90 days
  retry:
    max-pause: 30s
    tiers:
      - { name: "5s", delay: 5s }
      - { name: "1m", delay: 1m }
      - { name: "5m", delay: 5m }
      - { name: "30m", delay: 30m }
  pattern:
    window: ${RELIABILITY_PATTERN_WINDOW:5m}
    threshold: ${RELIABILITY_PATTERN_THRESHOLD:500}
    grace: 1m
  notifier:
    enabled: ${RELIABILITY_NOTIFIER_ENABLED:false}
    channel: ${RELIABILITY_NOTIFIER_CHANNEL:log}    # log | webhook
    webhook-url: ${RELIABILITY_NOTIFIER_WEBHOOK_URL:}
  housekeeping:
    stale-sweep-interval-ms: 3600000   # 1h
    resolve-grace: 2m
    terminal-retention: 30d
  replay:
    destination: ${RELIABILITY_REPLAY_DESTINATION:original}   # original | <fixed-topic>
    bulk-batch-size: 1000
    # Maker-checker (4-eyes) for replay/bulk-replay/quarantine (§13/§17): a maker raises a request a
    # different checker must approve before it executes. Set false for a non-regulated/dev deployment.
    approval-required: ${RELIABILITY_APPROVAL_REQUIRED:true}
    require-distinct-checker: ${RELIABILITY_REQUIRE_DISTINCT_CHECKER:true}
    # Topics a replay may be redirected to besides the original (e.g. a fix/replay topic). Comma list.
    # allowed-topics: payments.retry,orders.retry
  # Payload protection: AES-256-GCM encryption at rest + regex PII masking for API display (§ security).
  # Encryption is opt-in; masking is on by default with patterns for SSN, credit card, IBAN, email.
  # Override patterns in YAML to add bank-specific formats (e.g. internal account numbers).
  payload-protection:
    encryption-enabled: ${RELIABILITY_ENCRYPTION_ENABLED:false}
    encryption-key: ${RELIABILITY_ENCRYPTION_KEY:}
    masking-enabled: ${RELIABILITY_MASKING_ENABLED:true}
  # GenAI operations assistant (§ intelligence). Points at a self-hosted, OpenAI-compatible chat model
  # so failed-event data never leaves the bank's network. Disabled by default; the context fed to the
  # model is always PII-masked. Example: RELIABILITY_ASSISTANT_URL=http://llm.internal:8000/v1
  assistant:
    enabled: ${RELIABILITY_ASSISTANT_ENABLED:false}
    base-url: ${RELIABILITY_ASSISTANT_URL:}
    model: ${RELIABILITY_ASSISTANT_MODEL:brod-assistant}
    api-key: ${RELIABILITY_ASSISTANT_API_KEY:}
    timeout: 30s
  # Financial exposure / "value at risk" (§16). Read-only: sums the business amount of stuck
  # (un-recovered) failures by extracting a numeric amount + currency from each JSON payload. Point the
  # field lists at the names your events use (comma-separated, dot-paths allowed, first match wins). Only
  # aggregated totals are returned — raw payloads are never exposed by this endpoint.
  exposure:
    amount-fields: ${RELIABILITY_EXPOSURE_AMOUNT_FIELDS:amount,transactionAmount,amt,value}
    currency-fields: ${RELIABILITY_EXPOSURE_CURRENCY_FIELDS:currency,ccy,currencyCode}
    default-currency: ${RELIABILITY_EXPOSURE_DEFAULT_CURRENCY:UNKNOWN}

logging:
  level:
    com.eventreliability: INFO
    # SSE clients (browser console / a curl on /api/stream) dropping mid-stream surface as broken-pipe
    # IOExceptions that embedded Tomcat logs at ERROR for every failed write. They're harmless — the
    # live feed is best-effort and all state lives in Kafka — but a burst (e.g. during a storm) floods
    # the console. Silence just that servlet's error log; real API errors still surface via responses.
    "[org.apache.catalina.core.ContainerBase.[Tomcat].[localhost].[/].[dispatcherServlet]]": "off"
